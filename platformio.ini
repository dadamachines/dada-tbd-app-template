[platformio]

[env:tusb-msc-oled]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = generic_rp2350
framework = picosdk
extra_scripts = post:no_flash.py

build_src_filter =
  -<*>
  +<main.c>
  +<msc_disk.c>
  +<usb_descriptors.c>
  +<hw_config.c>

build_flags =
  -DPICO_NO_FLASH=1
  -DPICO_FLASH_SIZE_BYTES=33554432
  -DPICO_NO_BINARY_INFO=1
  -DPICO_STDIO_USB=0
  -DPICO_STDIO_USB_USE_DEFAULT_DESCRIPTORS=0
  -DPICO_MAX_SHARED_IRQ_HANDLERS=8u
  -DPARAM_ASSERTIONS_ENABLE_ALL=1
  -DPICO_MALLOC_PANIC=1
  -DPICO_USE_STACK_GUARDS=1
  -DUSE_PRINTF
  -DUSE_DBG_PRINTF
  -I include
  -I lib/no-OS-FatFS/include
  -I lib/no-OS-FatFS/ff15/source
  -I lib/no-OS-FatFS/sd_driver
  -I lib/no-OS-FatFS/sd_driver/SDIO
  -I lib/lcdspi
  -I lib/lcdspi/fonts
  -I lib/i2ckbd
  -Wall

lib_ldf_mode = deep
